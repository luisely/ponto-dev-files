<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' https:; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:;">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Registrar">
  <meta name="theme-color" content="#030812">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanillajs-datepicker@1.3.4/dist/css/datepicker.min.css">
  <link rel="stylesheet" type="text/css" href="./output.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Madimi+One&family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap"
    rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Share+Tech+Mono&family=Space+Grotesk:wght@300..700&display=swap"
    rel="stylesheet">
  <style>
    input {
      -webkit-appearance: none;
      appearance: none;
      border-radius: 0;
    }
  </style>

  <title>Registrar Ponto</title>
</head>

<body class="dark:bg-[#0B1A12] w-dvw h-dvh flex items-center justify-center py-4">
  <div class="flex flex-col items-center justify-center h-full w-full px-4">
    <div class="lg:w-2xl text-xs px-4 text-white text-left"></div>

    <!-- INPUTS USERS DATA -->
    <form id="form" class="dark:text-[#EDE7D6] w-full md:max-w-xl lg:max-w-2xl">
      <div
        class="w-full mx-auto flex border dark:border-[#1D4A2E] border-black items-center px-1 bg-[#9dfac1] dark:bg-[#0D0D0D]/50 rounded-t-xs">
        <input
          class="h-8 lg:h-12 lg:text-2xl text-center outline-none rounded-md border-r dark:border-[#1D4A2E] border-black text-lg sm:text-base md:text-lg"
          type="text" id="name" placeholder="Nome" maxlength="20" spellcheck="false" />
        <input id="digits"
          class="w-full lg:h-12 lg:text-2xl rounded-tr text-center dark:border-[#1D4A2E] outline-none border-black text-lg sm:text-base md:text-lg"
          inputmode="numeric" pattern="[0-9]*" placeholder="pin" maxlength="3" type="password" />
      </div>

      <div
        class="w-full mx-auto flex items-center border-b border-l border-r dark:border-[#1D4A2E] bg-[#9dfac1] dark:bg-[#0D0D0D]/50 border-black px-1">
        <input
          class="h-8 lg:h-12 lg:text-2xl border-r dark:border-[#1D4A2E] border-black outline-none text-center text-lg sm:text-base md:text-lg"
          type="text" id="date" placeholder="Data" name="date" inputmode='none' />
        <input class="w-full px-4 lg:h-12 lg:text-2xl outline-none text-center text-lg sm:text-base md:text-lg"
          type="time" id="time" placeholder="Hora" />
      </div>
    </form>

    <!-- BUTTONS -->
    <div class="w-full flex mt-2 md:max-w-xl lg:max-w-2xl">
      <button id="registerBtn" class="w-full py-2 text-lg sm:text-base md:text-lg lg:text-2xl xl:text-2xl
              cursor-pointer bg-[#54dd89] text-black dark:text-[#f59f1e] rounded-xs
              hover:bg-[#2ea15b] hover:text-[#0B1A12]
              dark:bg-[#0B1A12] dark:hover:bg-[#F5B11E]
              border border-black dark:border-[#F5B11E]
              font-semibold tracking-wide transform transition-all duration-150
              data-[isLoading='true']:cursor-not-allowed data-[isLoading='true']:opacity-50">
        REGISTRAR
      </button>
    </div>

    <div id="divPontos" class="w-full md:max-w-xl lg:max-w-2xl text-white mt-2 overflow-y-auto space-y-2">
    </div>
  </div>
  <script type="module" src="./bundle.js"></script>
</body>

</html>
