<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Registrar">
  <meta name="theme-color" content="#030812">
  <link rel="apple-touch-icon" href="/icons/AppIcon.png">
  <link rel="icon" href="/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Madimi+One&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&family=SUSE+Mono:ital,wght@0,100..800;1,100..800&family=Share+Tech+Mono&family=Space+Grotesk:wght@300..700&display=swap"
    rel="stylesheet">

  <title>Ponto Eletrônico</title>
</head>

<body class="dark:bg-[#0B1A12] w-dvw h-dvh flex items-center justify-center py-4">

  <!-- TELA DE CARREGAMENTO (inicial) -->
  <div id="loadingScreen" class="flex flex-col items-center justify-center h-full w-full px-4">
    <div class="flex flex-col items-center gap-5">
      <div class="relative w-16 h-16">
        <div class="absolute inset-0 rounded-full border-4 border-[#1D4A2E]"></div>
        <div class="absolute inset-0 rounded-full border-4 border-transparent border-t-[#54dd89] animate-spin"></div>
      </div>
      <p class="text-gray-400 text-sm animate-pulse">Carregando...</p>
    </div>
  </div>

  <!-- TELA DE LOGIN -->
  <div id="loginScreen" class="hidden flex-col items-center justify-center h-full w-full px-4">
    <div class="w-full max-w-md">
      <!-- Logo/Brand -->
      <div class="text-center mb-8">
        <div
          class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-linear-to-br from-[#54dd89] to-[#2ea15b] mb-4 shadow-lg">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img"
            aria-labelledby="logoTitle">
            <title id="logoTitle">Ícone de relógio - Ponto Eletrônico</title>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <h1 class="text-4xl lg:text-5xl font-bold text-white mb-2">Ponto Eletrônico</h1>
        <p class="text-gray-400 text-sm lg:text-base">Registre seus horários de forma simples e segura</p>
      </div>

      <!-- Card de Login -->
      <div class="bg-[#0D0D0D]/50 border border-[#1D4A2E] rounded-lg p-8 backdrop-blur-sm">
        <h2 class="text-xl font-semibold text-white mb-6 text-center">Faça login para continuar</h2>

        <button id="googleLoginBtn" type="button"
          class="w-full bg-white cursor-pointer text-gray-700 border border-gray-300 rounded-lg px-6 py-4 flex items-center justify-center gap-3 hover:bg-gray-50 hover:shadow-lg transition-all font-medium text-base">
          <svg class="w-6 h-6" viewBox="0 0 24 24" role="img" aria-labelledby="googleIconTitle">
            <title id="googleIconTitle">Logo do Google</title>
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          Entrar com Google
        </button>

        <div class="mt-6 text-center text-xs text-gray-500">
          Ao continuar, você concorda com nossos Termos de Uso
        </div>
      </div>
    </div>
  </div>

  <!-- TELA PRINCIPAL (após login) -->
  <div id="mainScreen" class="hidden flex-col items-center justify-center h-full w-full px-4">

    <!-- Header com boas-vindas -->
    <div id="welcomeMessage" class="w-full md:max-w-xl lg:max-w-2xl text-center text-white mb-4">
      <div class="bg-[#0D0D0D]/50 dark:border-[#1D4A2E] border border-black rounded-lg p-4 lg:p-5">
        <div class="flex items-center justify-between w-full">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-linear-to-br from-[#54dd89] to-[#2ea15b] flex items-center justify-center">
              <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" role="img"
                aria-labelledby="avatarTitle">
                <title id="avatarTitle">Ícone de relógio do usuário</title>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
            </div>
            <div class="text-left">
              <p class="text-xs text-gray-400">Bem-vindo</p>
              <h1 id="welcomeTitle" class="text-xl lg:text-2xl font-bold text-[#54dd89]">Carregando...</h1>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <!-- Status de conexão -->
            <span id="connectionStatus" class="cursor-help" title="Status de conexão">
              <i data-lucide="wifi" class="w-5 h-5"></i>
            </span>
            <!-- Badge de pendências -->
            <div class="relative">
              <button id="menuBtn" type="button"
                class="rounded-lg border border-[#1D4A2E] bg-[#0D0D0D] p-2.5 text-white hover:bg-[#1D4A2E]/50 cursor-pointer transition">
                <i data-lucide="menu"></i>
              </button>
              <span id="pendingBadge"
                class="hidden absolute -top-1 -right-1 bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold">
                0
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Formulário de registro -->
    <form id="form" class="dark:text-[#EDE7D6] w-full md:max-w-xl lg:max-w-2xl">
      <div id="dateAndTimeContainer"
        class="w-full mx-auto flex items-center border dark:border-[#1D4A2E] bg-[#9dfac1] dark:bg-[#0D0D0D]/50 border-black rounded overflow-hidden">
        <input
          class="flex-1 h-12 lg:h-14 lg:text-xl border-r dark:border-[#1D4A2E] border-black outline-none text-center text-base bg-transparent"
          aria-label="Data do registro" type="text" id="date" placeholder="Data" name="date" inputmode='none' />
        <input class="flex-1 h-12 lg:h-14 lg:text-xl outline-none text-center text-base bg-transparent px-2"
          aria-label="Hora do registro" type="time" id="time" placeholder="Hora" />
      </div>
    </form>

    <!-- Botão de registrar -->
    <div class="w-full flex mt-2 md:max-w-xl lg:max-w-2xl">
      <button type="button" id="registerBtn" class="w-full py-3 lg:py-4 text-base lg:text-xl
              cursor-pointer bg-[#54dd89] text-black dark:text-[#f59f1e] rounded-lg
              hover:bg-[#2ea15b] hover:text-[#0B1A12] hover:shadow-lg
              dark:bg-[#0B1A12] dark:hover:bg-[#F5B11E]
              border border-black dark:border-[#F5B11E]
              font-semibold tracking-wide transform transition-all duration-150
              data-[isLoading='true']:cursor-not-allowed data-[isLoading='true']:opacity-50">
        REGISTRAR
      </button>
    </div>

    <!-- Lista de pontos -->
    <div id="divPontos" class="w-full md:max-w-xl lg:max-w-2xl text-white mt-4 overflow-y-auto space-y-2">
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
